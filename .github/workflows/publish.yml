name: Publish to PyPI

# Publishes on a version tag (v0.1.0), or on manual dispatch. Uses PyPI trusted
# publishing (OIDC), so there is no token to store: PyPI is configured to trust
# this repo's workflow. Gated on the tests passing.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pytest -q

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write        # trusted publishing (OIDC); no PyPI token needed
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          python -m pip install --upgrade pip build
          python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
